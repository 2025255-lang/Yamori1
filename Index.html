<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オンライン 3Dプラレール</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
        
        /* ログイン画面 */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(221, 238, 255, 0.95); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 80%;
        }
        .login-box input {
            width: 80%; padding: 12px; font-size: 16px; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 6px;
        }
        .login-box button {
            background: #e63946; color: white; padding: 12px 24px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 85%;
        }
        .login-box button:hover { background: #d62828; }

        /* 左側サイドバー */
        #sidebar-wrapper {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            display: flex; align-items: flex-start; transition: transform 0.3s ease;
        }
        #sidebar-wrapper.collapsed { transform: translateX(-100%); }
        #sidebar {
            width: 280px; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; pointer-events: auto;
        }
        #toggle-sidebar {
            background: #1955a6; color: white; border: none; padding: 15px 10px; cursor: pointer;
            border-radius: 0 8px 8px 0; font-weight: bold; font-size: 16px; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            pointer-events: auto; position: absolute; right: -35px; top: 0;
        }

        h2 { margin-top: 0; font-size: 15px; border-bottom: 2px solid #1955a6; padding-bottom: 5px; margin-bottom: 10px;}
        button, select {
            width: 100%; padding: 8px; margin-bottom: 6px; border: 1px solid #ccc;
            border-radius: 4px; background: #f9f9f9; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        button:hover:not(:disabled) { background: #e0e0e0; transform: translateY(-1px); }
        
        .mode-box { background: #e8f4f8; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #bce0fd;}
        .mode-label { display: block; margin-bottom: 8px; font-size: 13px; cursor: pointer; font-weight: bold; color:#333;}
        .mode-label input { margin-right: 8px; transform: scale(1.2); }
        .mode-label.highlight { background-color: #ffebee; padding: 4px; border-radius: 4px; border: 1px solid #ffcdd2; color: #c62828;}

        .scenery-btn { background-color: #e0f7fa; color: #006064; border: 1px solid #b2ebf2; }
        #runBtn { background-color: #e63946; color: white; border: none; margin-top: 10px; padding: 12px;}
        #status { font-size: 12px; color: #333; margin-bottom: 10px; background: #eee; padding: 8px; border-radius: 4px; font-weight: bold;}
        #save-status { font-size: 11px; color: #1955a6; text-align: center; margin-top: 5px; font-weight: bold; min-height: 15px; }

        /* 右側チャット＆ユーザーリスト */
        #chat-panel {
            position: absolute; top: 10px; right: 10px; width: 250px;
            background: rgba(255, 255, 255, 0.9); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 1000; overflow: hidden;
        }
        #user-list-box { background: #f1f8e9; padding: 10px; border-bottom: 1px solid #ccc; font-size: 12px; max-height: 80px; overflow-y: auto;}
        #chat-box { height: 150px; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .chat-msg { background: #e3f2fd; padding: 6px; border-radius: 6px; align-self: flex-start; max-width: 90%; word-wrap: break-word;}
        .chat-msg b { color: #1955a6; }
        .chat-msg.me { background: #fff9c4; align-self: flex-end; }
        #chat-input-box { display: flex; padding: 5px; border-top: 1px solid #ccc; background: white; }
        #chat-input { flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        #chat-btn { width: 50px; padding: 5px; margin-left: 5px; background: #1955a6; color: white; border: none; border-radius: 4px; cursor: pointer; }

        #instruction {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px;
            font-size: 14px; pointer-events: none; font-weight: bold; text-align: center; z-index: 100; display: none;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color:#1955a6; margin-top:0;">🌐 オンラインプラレール</h1>
            <input type="text" id="name-input" placeholder="あなたのなまえ" />
            <input type="text" id="world-input" placeholder="ワールド名 (例: room1)" />
            <button onclick="joinWorld()">ワールドに入る！</button>
        </div>
    </div>

    <div id="sidebar-wrapper" style="display: none;">
        <div id="sidebar">
            <h2>🛠 操作モード</h2>
            <div class="mode-box">
                <label class="mode-label"><input type="radio" name="opMode" value="normal" checked onchange="updateMode()">🎥 視点切替 (列車タップ)</label>
                <label class="mode-label"><input type="radio" name="opMode" value="cursor" onchange="updateMode()">📍 レール起点変更 (タップ)</label>
                <label class="mode-label highlight"><input type="radio" name="opMode" value="addTrain" onchange="updateMode()">➕ 列車配置 (レールタップ)</label>
                <label class="mode-label"><input type="radio" name="opMode" value="delTrain" onchange="updateMode()">🗑️ 列車削除 (列車タップ)</label>
            </div>

            <h2>レール構築 (緑枠が開始位置)</h2>
            <div id="status">通信準備中...</div>
            <button onclick="addRail('straight')">↑ 直線レール</button>
            <button onclick="addRail('curveLeft')">← 曲線レール（左）</button>
            <button onclick="addRail('curveRight')">→ 曲線レール（右）</button>
            <button onclick="addRail('slopeUp')">↗ ニュー坂（上）</button>
            <button onclick="addRail('slopeDown')">↘ ニュー坂（下）</button>
            <button onclick="addPier()" style="background-color: #f1c40f; color: #333; border:none;">🟨 橋脚</button>
            <button class="scenery-btn" onclick="addRail('station')">🚉 駅 (自動停車)</button>
            <button class="scenery-btn" style="background-color: #fff9c4; color: #f57f17; border-color: #fff59d;" onclick="addRail('crossing')">🚧 踏切</button>
            <button onclick="undoLastAction()">↩ 1つ消去</button>

            <h2>列車コントロール</h2>
            <select id="trainColor">
                <option value="red">特急レッド (赤)</option>
                <option value="yellow">ドクターイエロー風 (黄)</option>
                <option value="blue">新幹線ブルー (青)</option>
                <option value="green">通勤グリーン (緑)</option>
            </select>
            <button id="runBtn" onclick="toggleTrainRun()">▶️ 全列車を動かす</button>
            <h2>その他</h2>
            <button onclick="resetSystem()">すべてリセット</button>
            <div id="save-status"></div>
        </div>
        <button id="toggle-sidebar" onclick="toggleSidebar()">◀</button>
    </div>

    <div id="chat-panel">
        <div id="user-list-box"><b>👥 同じワールドにいる人:</b><br><span id="user-list-text"></span></div>
        <div id="chat-box"></div>
        <div id="chat-input-box">
            <input type="text" id="chat-input" placeholder="メッセージ..." onkeydown="if(event.key==='Enter') sendChat()" />
            <button id="chat-btn" onclick="sendChat()">送信</button>
        </div>
    </div>

    <div id="instruction">モードを選択して画面をタップしてください</div>

    <script>
        let mqttClient = null, worldTopic = "", currentWorldName = "", myName = "";
        const myClientId = Math.random().toString(16).substr(2, 8);
        let isNetworkAction = false, networkHistory = [], activeUsers = {};

        let scene, camera, renderer, controls;
        const rails = [], actionHistory = [], stationMeshes = [];
        let trackSegments = [], pathCurves = [], loopSettings = {}; 
        const RAIL_LENGTH = 20, PIER_HEIGHT = 6, CURVE_RADIUS = 20;
        let connectPoint = new THREE.Vector3(0, 0, 0);
        let currentAngle = 0, currentFloor = 0;
        const trains = [];
        let isRunning = false, isDriverView = false, activeTrainIndex = null;
        let currentMode = 'normal', buildCursor; 
        const TRAIN_COLORS = { red: 0xd82b3a, yellow: 0xf1c40f, blue: 0x1955a6, green: 0x2ecc71 };
        const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        const railMat = new THREE.MeshLambertMaterial({ color: 0x2c6bdb });
        const pierMat = new THREE.MeshLambertMaterial({ color: 0xf1c40f });

        function toggleSidebar() {
            const wrapper = document.getElementById('sidebar-wrapper');
            const btn = document.getElementById('toggle-sidebar');
            wrapper.classList.toggle('collapsed');
            btn.innerText = wrapper.classList.contains('collapsed') ? '▶' : '◀';
        }

        function joinWorld() {
            myName = document.getElementById('name-input').value.trim() || "名無しさん";
            currentWorldName = document.getElementById('world-input').value.trim();
            if(!currentWorldName) return alert("ワールド名を入力してね！");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('sidebar-wrapper').style.display = 'flex';
            document.getElementById('chat-panel').style.display = 'flex';
            document.getElementById('instruction').style.display = 'block';
            
            init3D();
            worldTopic = "plarail-multiplayer-magic/" + currentWorldName;
            mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
            
            mqttClient.on('connect', () => {
                mqttClient.subscribe(worldTopic); mqttClient.subscribe(worldTopic + "/state"); 
                updateStatus(); broadcast({ action: 'hello', name: myName });
                setInterval(() => { broadcast({ action: 'presence', name: myName }); }, 3000);
                setInterval(cleanupUsers, 5000);
            });
            mqttClient.on('message', (t, m) => { handleNetworkMessage(JSON.parse(m.toString())); });
        }

        function sendChat() {
            const input = document.getElementById('chat-input'), text = input.value.trim();
            if (!text) return;
            broadcast({ action: 'chat', text: text, name: myName });
            addChatMessage(myName, text, true); input.value = "";
        }
        function addChatMessage(name, text, isMe) {
            const box = document.getElementById('chat-box'), msg = document.createElement('div');
            msg.className = "chat-msg" + (isMe ? " me" : ""); msg.innerHTML = `<b>${name}:</b> ${text}`;
            box.appendChild(msg); box.scrollTop = box.scrollHeight;
        }
        function updatePresence(clientId, name) { activeUsers[clientId] = { name: name, lastSeen: Date.now() }; renderUserList(); }
        function cleanupUsers() {
            let changed = false; const now = Date.now();
            for (let id in activeUsers) { if (now - activeUsers[id].lastSeen > 10000) { delete activeUsers[id]; changed = true; } }
            if(changed) renderUserList();
        }
        function renderUserList() {
            let names = [myName + " (あなた)"];
            for (let id in activeUsers) { if(id !== myClientId) names.push(activeUsers[id].name); }
            document.getElementById('user-list-text').innerText = names.join(" / ");
        }

        function saveWorldCloud() {
            if(!currentWorldName || !mqttClient) return;
            mqttClient.publish(worldTopic + "/state", JSON.stringify({ action: 'full_sync', history: networkHistory, from: myClientId }), { retain: true });
            const saveText = document.getElementById('save-status'); saveText.innerText = "☁️ クラウドに保存しました";
            setTimeout(() => { if(saveText.innerText === "☁️ クラウドに保存しました") saveText.innerText = ""; }, 2000);
        }

        function rebuildFromHistory(historyArray) {
            isNetworkAction = true; resetSystem(true);
            historyArray.forEach(h => {
                if (h.action === 'addRail') addRail(h.val); else if (h.action === 'addPier') addPier();
                else if (h.action === 'addTrain') { document.getElementById('trainColor').value = h.color; addTrainAtPoint(new THREE.Vector3(h.pt.x, h.pt.y, h.pt.z)); }
                else if (h.action === 'delTrain') deleteTrain(h.id);
            });
            isNetworkAction = false;
        }

        function broadcast(data) { if(isNetworkAction || !mqttClient) return; data.from = myClientId; mqttClient.publish(worldTopic, JSON.stringify(data)); }

        function handleNetworkMessage(msg) {
            if (msg.from === myClientId) return;
            isNetworkAction = true;
            try {
                if (msg.action === 'full_sync') { if (msg.history && msg.history.length > networkHistory.length) { rebuildFromHistory(msg.history); networkHistory = msg.history; updateStatus(); } }
                else if (msg.action === 'hello') { updatePresence(msg.from, msg.name); if (networkHistory.length > 0) setTimeout(() => { broadcast({ action: 'sync', history: networkHistory }); }, Math.random() * 500); }
                else if (msg.action === 'presence') updatePresence(msg.from, msg.name);
                else if (msg.action === 'chat') addChatMessage(msg.name, msg.text, false);
                else if (msg.action === 'sync') { if (msg.history && msg.history.length > networkHistory.length) { rebuildFromHistory(msg.history); networkHistory = msg.history; saveWorldCloud(); updateStatus(); } }
                else if (msg.action === 'addRail') { networkHistory.push({ action: 'addRail', val: msg.val }); addRail(msg.val); }
                else if (msg.action === 'addPier') { networkHistory.push({ action: 'addPier' }); addPier(); }
                else if (msg.action === 'addTrain') { networkHistory.push({ action: 'addTrain', pt: msg.pt, color: msg.color }); document.getElementById('trainColor').value = msg.color; addTrainAtPoint(new THREE.Vector3(msg.pt.x, msg.pt.y, msg.pt.z)); }
                else if (msg.action === 'delTrain') { networkHistory.push({ action: 'delTrain', id: msg.id }); deleteTrain(msg.id); }
                else if (msg.action === 'undo') { networkHistory.pop(); undoLastAction(); }
                else if (msg.action === 'reset') { networkHistory = []; resetSystem(true); }
                else if (msg.action === 'toggleRun') toggleTrainRun(msg.state);
            } finally { isNetworkAction = false; }
        }

        function init3D() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xddeeff); scene.fog = new THREE.Fog(0xddeeff, 100, 300);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.set(30, 40, 50);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9); dirLight.position.set(50, 100, 50); dirLight.castShadow = true; scene.add(dirLight);
            scene.add(new THREE.GridHelper(400, 100, 0xcccccc, 0xcccccc));
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshLambertMaterial({ color: 0xc8e6c9 })); ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; ground.userData = { isGround: true }; scene.add(ground);
            controls = new THREE.OrbitControls(camera, renderer.domElement); controls.target.set(0, 0, 0);
            buildCursor = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, RAIL_LENGTH), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 })); buildCursor.position.set(0, 0.75, -RAIL_LENGTH/2); scene.add(buildCursor);
            updateCursorVisual();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            window.addEventListener('pointerdown', onPointerDown);
            updateMode(); animate();
        }

        function updateMode() {
            currentMode = document.querySelector('input[name="opMode"]:checked').value;
            const inst = document.getElementById('instruction'); buildCursor.visible = false;
            if(currentMode === 'normal') inst.innerText = "🎥 走っている列車をタップで視点切替";
            else if(currentMode === 'cursor') { inst.innerText = "📍 地面やレール端をタップして続きを作る場所を変更"; buildCursor.visible = true; }
            else if(currentMode === 'addTrain') inst.innerText = "👆 列車を置きたいレールを直接タップ";
            else if(currentMode === 'delTrain') inst.innerText = "🗑️ 削除したい列車をタップ";
        }

        function updateCursorVisual() {
            buildCursor.position.copy(connectPoint);
            const offset = new THREE.Vector3(0, (PIER_HEIGHT*currentFloor) + 0.75, -RAIL_LENGTH/2).applyAxisAngle(new THREE.Vector3(0,1,0), currentAngle);
            buildCursor.position.add(offset); buildCursor.rotation.y = currentAngle;
        }

        function onPointerDown(event) {
            if(event.target.tagName !== 'CANVAS') return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1; mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera); const intersects = raycaster.intersectObjects(scene.children, true);
            if(intersects.length === 0) return;
            let hitObj = intersects[0].object; let rootObj = hitObj; while(rootObj.parent && rootObj.parent.type !== 'Scene') rootObj = rootObj.parent;
            if (currentMode === 'normal') {
                let tId = getTrainIdFromObject(hitObj); if(tId !== null) { activeTrainIndex = tId; toggleCameraMode(true); } else if (isDriverView) toggleCameraMode(false);
            } else if (currentMode === 'cursor') {
                if(hitObj.userData.isGround) { connectPoint.copy(intersects[0].point); connectPoint.y = 0; currentAngle = 0; currentFloor = 0; } 
                else if (rootObj.userData && rootObj.userData.isRail) { connectPoint.copy(rootObj.userData.endPt); currentAngle = rootObj.userData.endAngle; currentFloor = rootObj.userData.endFloor; }
                updateCursorVisual();
            } else if (currentMode === 'addTrain') { if (rootObj.userData && rootObj.userData.isRail) addTrainAtPoint(intersects[0].point);
            } else if (currentMode === 'delTrain') { let tId = getTrainIdFromObject(hitObj); if(tId !== null) deleteTrain(tId); }
        }

        function getTrainIdFromObject(obj) { let curr = obj; while(curr) { if(curr.userData && curr.userData.trainId !== undefined) return curr.userData.trainId; curr = curr.parent; } return null; }
        function getRailShape() { const s = new THREE.Shape(); s.moveTo(-2.0, 0); s.lineTo(2.0, 0); s.lineTo(2.0, 1.0); s.lineTo(1.5, 1.0); s.lineTo(1.5, 0.5); s.lineTo(0.5, 0.5); s.lineTo(0.5, 1.0); s.lineTo(-0.5, 1.0); s.lineTo(-0.5, 0.5); s.lineTo(-1.5, 0.5); s.lineTo(-1.5, 1.0); s.lineTo(-2.0, 1.0); s.lineTo(-2.0, 0); return s; }

        function createRailMesh(type, isLeft) {
            const group = new THREE.Group();
            if(type === 'straight' || type === 'station' || type === 'crossing') {
                const base = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, RAIL_LENGTH), railMat); base.position.set(0, 0.25, -RAIL_LENGTH/2); group.add(base);
                const l = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, RAIL_LENGTH), railMat); l.position.set(-1.75, 0.75, -RAIL_LENGTH/2); group.add(l);
                const r = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, RAIL_LENGTH), railMat); r.position.set(1.75, 0.75, -RAIL_LENGTH/2); group.add(r);
                const c = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.5, RAIL_LENGTH), railMat); c.position.set(0, 0.75, -RAIL_LENGTH/2); group.add(c);
                if (type === 'station') {
                    const platMat = new THREE.MeshLambertMaterial({color: 0xdddddd}); const roofMat = new THREE.MeshLambertMaterial({color: 0x3498db});
                    const plat = new THREE.Mesh(new THREE.BoxGeometry(5, 1.5, RAIL_LENGTH - 2), platMat); plat.position.set(-4.5, 0.75, -RAIL_LENGTH/2); group.add(plat);
                    const roof = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.5, RAIL_LENGTH - 2), roofMat); roof.position.set(-4.5, 4.5, -RAIL_LENGTH/2); group.add(roof);
                    const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), platMat); p1.position.set(-4.5, 2.5, -RAIL_LENGTH/2 + 5); group.add(p1);
                    const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), platMat); p2.position.set(-4.5, 2.5, -RAIL_LENGTH/2 - 5); group.add(p2);
                } else if (type === 'crossing') {
                    const road = new THREE.Mesh(new THREE.BoxGeometry(20, 0.4, 6), new THREE.MeshLambertMaterial({color: 0x444444})); road.position.set(0, 0.2, -RAIL_LENGTH/2); group.add(road);
                    const line1 = new THREE.Mesh(new THREE.BoxGeometry(20, 0.5, 0.5), new THREE.MeshLambertMaterial({color: 0xffffff})); line1.position.set(0, 0.45, -RAIL_LENGTH/2 + 2.5); group.add(line1);
                    const line2 = new THREE.Mesh(new THREE.BoxGeometry(20, 0.5, 0.5), new THREE.MeshLambertMaterial({color: 0xffffff})); line2.position.set(0, 0.45, -RAIL_LENGTH/2 - 2.5); group.add(line2);
                    const poleMat = new THREE.MeshLambertMaterial({color: 0xf1c40f});
                    const pole1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), poleMat); pole1.position.set(3, 2, -RAIL_LENGTH/2 + 4); group.add(pole1);
                    const pole2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), poleMat); pole2.position.set(-3, 2, -RAIL_LENGTH/2 - 4); group.add(pole2);
                }
            } else if (type === 'slope') {
                const h = isLeft ? PIER_HEIGHT : -PIER_HEIGHT;
                const curve = new THREE.CatmullRomCurve3([ new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -RAIL_LENGTH * 0.1), new THREE.Vector3(0, h * 0.5, -RAIL_LENGTH * 0.5), new THREE.Vector3(0, h, -RAIL_LENGTH * 0.9), new THREE.Vector3(0, h, -RAIL_LENGTH) ]);
                group.add(new THREE.Mesh(new THREE.ExtrudeGeometry(getRailShape(), { extrudePath: curve, steps: 20, bevelEnabled: false }), railMat));
            } else {
                const pivot = new THREE.Group(); const r = CURVE_RADIUS;
                const addP = (rIn, rOut, h, y) => { const s = new THREE.Shape(); if(isLeft) { s.absarc(0,0,rOut,0,Math.PI/2,false); s.absarc(0,0,rIn,Math.PI/2,0,true); } else { s.absarc(0,0,rOut,Math.PI/2,Math.PI,false); s.absarc(0,0,rIn,Math.PI,Math.PI/2,true); } const m = new THREE.Mesh(new THREE.ExtrudeGeometry(s, {depth:h, bevelEnabled:false, curveSegments:32}), railMat); m.rotation.x = -Math.PI/2; m.position.y = y; group.add(m); };
                addP(r-2, r+2, 0.5, 0); addP(r+1.5, r+2, 0.5, 0.5); addP(r-2, r-1.5, 0.5, 0.5); addP(r-0.5, r+0.5, 0.5, 0.5);
                group.position.x = isLeft ? -r : r; pivot.add(group); return pivot;
            }
            group.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; }}); return group;
        }

        function addRail(type) {
            let mesh, v = new THREE.Vector3(), rot = 0, inter = [];
            const startPt = connectPoint.clone(), startAng = currentAngle, startFl = currentFloor;

            switch(type) {
                case 'straight': case 'station': case 'crossing':
                    mesh = createRailMesh(type); v.set(0,0,-RAIL_LENGTH);
                    for(let i=1; i<=4; i++) inter.push(startPt.clone().add(v.clone().multiplyScalar(i/4).applyAxisAngle(new THREE.Vector3(0,1,0), startAng)));
                    break;
                case 'slopeUp':
                    mesh = createRailMesh('slope', true); v.set(0, PIER_HEIGHT, -RAIL_LENGTH);
                    for(let i=1; i<=6; i++) inter.push(startPt.clone().add(v.clone().multiplyScalar(i/6).applyAxisAngle(new THREE.Vector3(0,1,0), startAng))); currentFloor++; break;
                case 'slopeDown':
                    if(currentFloor<=0) return;
                    mesh = createRailMesh('slope', false); v.set(0, -PIER_HEIGHT, -RAIL_LENGTH);
                    for(let i=1; i<=6; i++) inter.push(startPt.clone().add(v.clone().multiplyScalar(i/6).applyAxisAngle(new THREE.Vector3(0,1,0), startAng))); currentFloor--; break;
                case 'curveLeft':
                    mesh = createRailMesh('curve', true); rot = Math.PI/2;
                    let cl = startPt.clone().add(new THREE.Vector3(-CURVE_RADIUS,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), startAng));
                    for(let i=1; i<=8; i++) inter.push(cl.clone().add(new THREE.Vector3(CURVE_RADIUS*Math.cos(i*(Math.PI/2)/8), 0, -CURVE_RADIUS*Math.sin(i*(Math.PI/2)/8)).applyAxisAngle(new THREE.Vector3(0,1,0), startAng))); break;
                case 'curveRight':
                    mesh = createRailMesh('curve', false); rot = -Math.PI/2;
                    let cr = startPt.clone().add(new THREE.Vector3(CURVE_RADIUS,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), startAng));
                    for(let i=1; i<=8; i++) inter.push(cr.clone().add(new THREE.Vector3(-CURVE_RADIUS*Math.cos(i*(Math.PI/2)/8), 0, -CURVE_RADIUS*Math.sin(i*(Math.PI/2)/8)).applyAxisAngle(new THREE.Vector3(0,1,0), startAng))); break;
            }
            
            connectPoint.copy(inter[inter.length - 1]); currentAngle += rot; 
            mesh.rotation.order = 'YXZ'; mesh.position.copy(startPt); mesh.position.y = PIER_HEIGHT * startFl; mesh.rotation.y = startAng;
            mesh.userData = { isRail: true, type: type, endPt: connectPoint.clone(), endAngle: currentAngle, endFloor: currentFloor };
            scene.add(mesh); rails.push(mesh);
            if(type === 'station') stationMeshes.push(mesh);
            actionHistory.push({mesh:mesh, startPt:startPt, ang:startAng, fl:startFl, interPts:inter.map(p=>p.clone())});
            
            if (!isNetworkAction) { const actionData = { action: 'addRail', val: type }; networkHistory.push(actionData); broadcast(actionData); saveWorldCloud(); }
            updatePathCurve(); updateStatus(); updateCursorVisual();
            if(currentMode === 'cursor') document.querySelector('input[value="normal"]').click();
        }

        function addPier() {
            if(currentFloor === 0) return;
            const m = new THREE.Mesh(new THREE.BoxGeometry(5, PIER_HEIGHT*currentFloor, 5), pierMat);
            m.position.set(connectPoint.x, (PIER_HEIGHT*currentFloor)/2, connectPoint.z);
            m.castShadow = true; m.receiveShadow = true; scene.add(m); rails.push(m);
            actionHistory.push({mesh:m, startPt:connectPoint.clone(), ang:currentAngle, fl:currentFloor, interPts:[]});
            if (!isNetworkAction) { const actionData = { action: 'addPier' }; networkHistory.push(actionData); broadcast(actionData); saveWorldCloud(); }
        }

        function undoLastAction() {
            if(actionHistory.length===0) return;
            const a = actionHistory.pop();
            if(a.mesh) { scene.remove(a.mesh); rails.splice(rails.indexOf(a.mesh), 1); }
            connectPoint.copy(a.startPt); currentAngle = a.ang; currentFloor = a.fl;
            if (!isNetworkAction) { networkHistory.pop(); broadcast({ action: 'undo' }); saveWorldCloud(); }
            updatePathCurve(); updateStatus(); updateCursorVisual();
        }

        function updatePathCurve() {
            trackSegments = [];
            actionHistory.forEach(action => {
                if (!action.mesh || action.interPts.length === 0) return; 
                let foundIdx = -1;
                for(let i=0; i<trackSegments.length; i++) { if(trackSegments[i].length > 0 && trackSegments[i][trackSegments[i].length-1].distanceTo(action.startPt) < 0.1) { foundIdx = i; break; } }
                if(foundIdx !== -1) trackSegments[foundIdx].push(...action.interPts); else trackSegments.push([action.startPt.clone(), ...action.interPts]);
            });
            pathCurves = trackSegments.map(pts => {
                if(pts.length > 1) {
                    let isClosed = (pts[0].distanceToSquared(pts[pts.length-1]) < 0.1);
                    let loopKey = pts[0].x.toFixed(1) + '_' + pts[0].y.toFixed(1) + '_' + pts[0].z.toFixed(1);
                    if(isClosed && loopSettings[loopKey] === undefined) loopSettings[loopKey] = confirm("レールが一周しました！\nそのままエンドレスに回れるようにしますか？");
                    let ptsForCurve = (loopSettings[loopKey] && isClosed) ? pts.slice(0, pts.length - 1) : pts;
                    return new THREE.CatmullRomCurve3(ptsForCurve, loopSettings[loopKey], 'centripetal', 0.1);
                }
                return null;
            });
        }

        // --- 🌟 電車モデルをさらにリアルに ---
        function createCarMesh(colorHex, trainId, carIndex) {
            const group = new THREE.Group();
            
            // 下部の台車部分
            const baseMat = new THREE.MeshLambertMaterial({color: 0x333333});
            const base = new THREE.Mesh(new THREE.BoxGeometry(3.6, 1.2, 14), baseMat); 
            base.position.set(0, 0.6, 0); group.add(base);

            // 車輪
            const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 3.8, 16); wheelGeo.rotateZ(Math.PI / 2);
            const wheelMat = new THREE.MeshLambertMaterial({color: 0x111111});
            [4, -4].forEach(z => { const w = new THREE.Mesh(wheelGeo, wheelMat); w.position.set(0, 0.6, z); group.add(w); });

            // メインボディ
            const bodyMat = new THREE.MeshLambertMaterial({color: colorHex});
            const bodyBox = new THREE.Mesh(new THREE.BoxGeometry(3.8, 3.0, 14), bodyMat);
            bodyBox.position.set(0, 2.7, 0); group.add(bodyBox);

            // 窓枠のライン
            const winMat = new THREE.MeshLambertMaterial({color: 0x222222});
            const windowBand = new THREE.Mesh(new THREE.BoxGeometry(3.9, 1.0, 13.8), winMat);
            windowBand.position.set(0, 3.0, 0); group.add(windowBand);

            // ドアの追加 (左右に3つずつ)
            const doorMat = new THREE.MeshLambertMaterial({color: 0x999999});
            [-4.5, 0, 4.5].forEach(z => {
                const doorL = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 2.4), doorMat);
                doorL.position.set(-1.91, 2.6, z); doorL.rotation.y = -Math.PI / 2; group.add(doorL);
                const doorR = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 2.4), doorMat);
                doorR.position.set(1.91, 2.6, z); doorR.rotation.y = Math.PI / 2; group.add(doorR);
            });

            // パンタグラフ (真ん中の車両)
            if (carIndex === 1) {
                const pantoMat = new THREE.MeshLambertMaterial({color: 0x666666});
                const pBase = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.2, 2.5), pantoMat); pBase.position.set(0, 4.3, 0); group.add(pBase);
                const pArm = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 1.5), pantoMat); pArm.position.set(0, 4.6, 0); group.add(pArm);
            }

            // 先頭車両・後尾車両の顔とライト
            if (carIndex === 0 || carIndex === 2) {
                const faceNose = new THREE.Mesh(new THREE.CylinderGeometry(1.9, 1.9, 3.8, 16), bodyMat);
                faceNose.rotation.z = Math.PI / 2; faceNose.scale.set(1, 1, 1.5);
                faceNose.position.set(0, 2.7, -7.0); group.add(faceNose);
                
                const frontWindow = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 1.5), winMat);
                frontWindow.position.set(0, 3.2, -7.5); frontWindow.rotation.y = Math.PI; frontWindow.rotation.x = -0.2;
                group.add(frontWindow);

                // ヘッドライト・テールライト
                const hlMat = new THREE.MeshBasicMaterial({color: 0xffffee});
                const tlMat = new THREE.MeshBasicMaterial({color: 0xff0000});
                
                const hl1 = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.4), hlMat); hl1.position.set(-1.0, 2.0, -8.0); hl1.rotation.y = Math.PI; hl1.rotation.x = 0.2; group.add(hl1);
                const hl2 = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.4), hlMat); hl2.position.set(1.0, 2.0, -8.0); hl2.rotation.y = Math.PI; hl2.rotation.x = 0.2; group.add(hl2);
                
                const tl1 = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.3), tlMat); tl1.position.set(-1.0, 3.6, -7.7); tl1.rotation.y = Math.PI; tl1.rotation.x = -0.2; group.add(tl1);
                const tl2 = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.3), tlMat); tl2.position.set(1.0, 3.6, -7.7); tl2.rotation.y = Math.PI; tl2.rotation.x = -0.2; group.add(tl2);
            }

            group.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; c.userData = { trainId: trainId }; }});
            group.userData = { trainId: trainId }; return group;
        }

        function addTrainAtPoint(hitPoint) {
            if(pathCurves.length === 0) return;
            let bestCurveIdx = -1, bestDist = 0, minDist = Infinity;
            pathCurves.forEach((curve, idx) => {
                if(!curve) return; let len = curve.getLength(); let steps = Math.max(100, Math.floor(len * 20));
                for(let i=0; i<=steps; i++) {
                    let u = i/steps; let pt = curve.getPointAt(u); let d = pt.distanceToSquared(hitPoint);
                    if(d < minDist) { minDist = d; bestCurveIdx = idx; bestDist = u * len; }
                }
            });
            if(bestCurveIdx === -1) return;
            
            const colorKey = document.getElementById('trainColor').value;
            const tId = trains.length > 0 ? Math.max(...trains.map(t=>t.id)) + 1 : 0;
            const cars = [];
            for(let i=0; i<3; i++) { const car = createCarMesh(TRAIN_COLORS[colorKey], tId, i); if(i===2) car.rotation.y = Math.PI; scene.add(car); cars.push(car); }
            trains.push({ id: tId, cars: cars, curveIndex: bestCurveIdx, absDist: bestDist, speed: 0.45, stopTimer: 0 });
            
            if (!isNetworkAction) { const actionData = { action: 'addTrain', pt: {x: hitPoint.x, y: hitPoint.y, z: hitPoint.z}, color: colorKey }; networkHistory.push(actionData); broadcast(actionData); saveWorldCloud(); }
            updateStatus(); document.querySelector('input[value="normal"]').click();
        }

        function deleteTrain(trainId) {
            const index = trains.findIndex(t => t.id === trainId);
            if(index !== -1) { trains[index].cars.forEach(car => scene.remove(car)); trains.splice(index, 1); updateStatus(); }
            if (!isNetworkAction) { const actionData = { action: 'delTrain', id: trainId }; networkHistory.push(actionData); broadcast(actionData); saveWorldCloud(); }
        }

        function toggleTrainRun(forceState) {
            if(trains.length === 0) return;
            isRunning = (typeof forceState === 'boolean') ? forceState : !isRunning;
            const btn = document.getElementById('runBtn'); btn.innerText = isRunning ? "⏹ 全列車ストップ" : "▶️ 全列車動かす"; btn.style.backgroundColor = isRunning ? "#333" : "#e63946";
            broadcast({ action: 'toggleRun', state: isRunning });
        }

        function toggleCameraMode(forceDriver) {
            isDriverView = forceDriver !== undefined ? forceDriver : !isDriverView;
            if(!isDriverView) { camera.position.set(connectPoint.x + 30, connectPoint.y + 40, connectPoint.z + 50); controls.target.copy(connectPoint); controls.enabled = true; activeTrainIndex = null; }
        }

        function resetSystem(isSilent) {
            rails.forEach(m => scene.remove(m)); rails.length=0; actionHistory.length=0; trackSegments=[]; pathCurves=[]; stationMeshes.length=0; loopSettings={};
            trains.forEach(t => t.cars.forEach(c => scene.remove(c))); trains.length = 0; connectPoint.set(0,0,0); currentAngle=0; currentFloor=0; isDriverView=false; isRunning=false;
            document.getElementById('runBtn').innerText = "▶️ 全列車動かす"; document.getElementById('runBtn').style.backgroundColor = "#e63946";
            if (!isNetworkAction && !isSilent) { networkHistory = []; broadcast({ action: 'reset' }); saveWorldCloud(); }
            updateStatus(); controls.target.set(0,0,0); updateCursorVisual();
        }

        function updateStatus() { document.getElementById('status').innerText = `高さ: ${currentFloor}階 | レール: ${rails.length} | 列車: ${trains.length} | ワールド: ${currentWorldName}`; }

        // レールからはみ出した時の直線を計算する関数
        function getExtrapolatedPoint(curve, d, totalLength) {
            if (d < 0) {
                let p0 = curve.getPointAt(0); let p1 = curve.getPointAt(0.01);
                let dir = new THREE.Vector3().subVectors(p0, p1).normalize();
                return p0.clone().add(dir.multiplyScalar(-d));
            } else if (d > totalLength) {
                let p1 = curve.getPointAt(1); let p0 = curve.getPointAt(0.99);
                let dir = new THREE.Vector3().subVectors(p1, p0).normalize();
                return p1.clone().add(dir.multiplyScalar(d - totalLength));
            }
            return curve.getPointAt(d / totalLength);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (trains.length > 0) {
                trains.forEach(train => {
                    if(train.curveIndex === -1 || !pathCurves[train.curveIndex]) return;
                    let curve = pathCurves[train.curveIndex]; let totalLength = curve.getLength(); if(totalLength === 0) return;
                    let pts = trackSegments[train.curveIndex]; let loopKey = pts[0].x.toFixed(1) + '_' + pts[0].y.toFixed(1) + '_' + pts[0].z.toFixed(1); 
                    let isLoop = (loopSettings[loopKey] === true);

                    if (isRunning) {
                        if (train.stopTimer > 0) train.stopTimer--;
                        else {
                            train.absDist += train.speed;
                            if(isLoop) train.absDist = ((train.absDist % totalLength) + totalLength) % totalLength;
                            else {
                                if(train.absDist >= totalLength) { train.absDist = totalLength; train.speed *= -1; } 
                                else if (train.absDist <= 0) { train.absDist = 0; train.speed *= -1; } 
                            }
                            
                            // 駅でのストップ判定 (先頭車両の座標を使用)
                            let headPos = train.cars[train.speed > 0 ? 0 : 2].position;
                            stationMeshes.forEach(st => { if (train.lastStationId !== st.uuid && headPos.distanceTo(st.position) < 3.0) { train.stopTimer = 120; train.lastStationId = st.uuid; }});
                            let isFar = true; stationMeshes.forEach(st => { if (headPos.distanceTo(st.position) < 15.0) isFar = false; }); if (isFar) train.lastStationId = null;
                        }
                    }
                    
                    for(let i=0; i<3; i++) {
                        // 車両ごとの間隔 (14.5)
                        let d = train.absDist - (i * 14.5 * Math.sign(train.speed)); 
                        
                        let pos, tgt;
                        if(isLoop) {
                            d = ((d % totalLength) + totalLength) % totalLength;
                            pos = curve.getPointAt(d / totalLength);
                            let lookD = ((d + 2.0 * Math.sign(train.speed)) % totalLength + totalLength) % totalLength;
                            tgt = curve.getPointAt(lookD / totalLength);
                        } else {
                            pos = getExtrapolatedPoint(curve, d, totalLength);
                            let lookD = d + 2.0 * Math.sign(train.speed);
                            tgt = getExtrapolatedPoint(curve, lookD, totalLength);
                        }
                        
                        train.cars[i].position.copy(pos);
                        if(i === 2) { let revTgt = new THREE.Vector3().subVectors(pos, tgt).add(pos); train.cars[i].lookAt(revTgt); } else { train.cars[i].lookAt(tgt); }
                    }
                });
                
                if (isDriverView && activeTrainIndex !== null) {
                    const activeTrain = trains.find(t => t.id === activeTrainIndex);
                    if(activeTrain && activeTrain.curveIndex !== -1 && pathCurves[activeTrain.curveIndex]) {
                        controls.enabled = false; trains.forEach(t => t.cars.forEach(c => c.visible = true));
                        let headIdx = activeTrain.speed > 0 ? 0 : 2; activeTrain.cars[headIdx].visible = false; 
                        const camPos = new THREE.Vector3(0, 5.0, 7.5); camPos.applyMatrix4(activeTrain.cars[headIdx].matrixWorld); camera.position.copy(camPos);
                        
                        let curve = pathCurves[activeTrain.curveIndex]; let totalLength = curve.getLength();
                        let isLoopCam = (loopSettings[trackSegments[activeTrain.curveIndex][0].x.toFixed(1) + '_' + trackSegments[activeTrain.curveIndex][0].y.toFixed(1) + '_' + trackSegments[activeTrain.curveIndex][0].z.toFixed(1)] === true);
                        
                        let camLookD = activeTrain.absDist - (headIdx * 14.5 * Math.sign(activeTrain.speed)) + 20.0 * Math.sign(activeTrain.speed);
                        let targetPos = isLoopCam ? curve.getPointAt(((camLookD % totalLength) + totalLength) % totalLength / totalLength) : getExtrapolatedPoint(curve, camLookD, totalLength);
                        
                        targetPos.y += 5.0; camera.lookAt(targetPos);
                    }
                } else { controls.enabled = true; }
            }
            if(controls.enabled) controls.update(); renderer.render(scene, camera);
        }
    </script>
